        </button>
      </div>

      <div className="bg-white rounded-xl border border-slate-200 overflow-hidden">
        <div className="overflow-x-auto">
          <table className="w-full text-sm">
            <thead className="bg-slate-50 border-b border-slate-200">
              <tr>{["Codice","Prodotto","Pz/conf","€/conf","Categoria","","Azioni"].map((h,i)=>(
                <th key={i} className={`px-3 py-3 font-semibold text-slate-700 ${i===6?"text-right":"text-left"}`}>{h}</th>))}
              </tr>
            </thead>
            <tbody>
              {supProds.map(p=>(
                <tr key={p.id} className="border-b border-slate-100 hover:bg-slate-50/50">
                  <td className="px-3 py-2.5 font-mono text-xs text-slate-500">{p.codice||"—"}</td>
                  <td className="px-3 py-2.5 font-medium text-slate-900 max-w-64 truncate">{p.nome}</td>
                  <td className="px-3 py-2.5 text-center text-slate-600">{p.pezzi_confezione}</td>
                  <td className="px-3 py-2.5 text-slate-700">{fmt(p.prezzo)}</td>
                  <td className="px-3 py-2.5 text-xs text-slate-500">{p.categoria}</td>
                  <td className="px-3 py-2.5">
                    {p.prescrizione&&<span className="text-[10px] font-semibold bg-amber-100 text-amber-800 px-1.5 py-0.5 rounded">Prescrizione</span>}
                  </td>
                  <td className="px-3 py-2.5 text-right">
                    <div className="flex items-center justify-end gap-1">
                      <button onClick={()=>setEditProd({...p})} className="p-1.5 text-slate-500 hover:text-blue-700 hover:bg-blue-50 rounded"><Icon name="edit-3" size={15}/></button>
                      <button onClick={()=>setDelProd(p)} className="p-1.5 text-slate-500 hover:text-red-700 hover:bg-red-50 rounded"><Icon name="trash-2" size={15}/></button>
                    </div>
                  </td>
                </tr>
              ))}
              {supProds.length===0&&<tr><td colSpan="7" className="text-center py-8 text-slate-400">Nessun prodotto trovato</td></tr>}
            </tbody>
          </table>
        </div>
      </div>

      {/* Modal aggiunta */}
      <Modal open={addOpen} onClose={()=>setAddOpen(false)} title={`Nuovo prodotto — ${selSup}`} size="md">
        <ProdForm init={{...emptyForm,fornitore:selSup}} onSave={addProduct} onCancel={()=>setAddOpen(false)}/>
      </Modal>

      {/* Modal modifica */}
      <Modal open={!!editProd} onClose={()=>setEditProd(null)} title={editProd?`Modifica: ${editProd.nome}`:""} size="md">
        {editProd&&<ProdForm init={editProd} onSave={f=>{setEditProd(f);saveEdit();}} onCancel={()=>setEditProd(null)}/>}
      </Modal>

      {/* Modal elimina */}
      <Modal open={!!delProd} onClose={()=>setDelProd(null)} title="Eliminare prodotto?" size="sm"
        footer={<><button onClick={()=>setDelProd(null)} className="px-4 py-2 bg-slate-100 hover:bg-slate-200 rounded-lg">Annulla</button>
          <button onClick={deleteProd} className="px-4 py-2 bg-red-600 hover:bg-red-700 text-white font-semibold rounded-lg">Elimina</button></>}>
        {delProd&&<p className="text-sm text-slate-700">Eliminare <strong>{delProd.nome}</strong> dal catalogo {selSup}? Gli ordini già inviati non vengono modificati.</p>}
      </Modal>
    </div>
  );
}

// ── ORDER VIEW/EDIT MODAL ─────────────────────────────────────
function OrderViewModal({order,mode,onClose,onSave}){
  const PRODUCTS=useProducts();
  const [quantities,setQuantities]=useState(()=>{
    const q={}; if(order)order.items.forEach(it=>{q[it.product_id]=it.quantity;}); return q;
  });
  const [search,setSearch]=useState("");
  const [cat,setCat]=useState("Tutte");
  const toast=useToast();
  if(!order)return null;
  const editable=mode==="edit";
  const total=Object.entries(quantities).reduce((s,[pid,q])=>{const p=PRODUCTS.find(pp=>pp.id===parseInt(pid));return s+(p?p.prezzo*q:0);},0);
  const cats=["Tutte",...new Set(PRODUCTS.map(p=>p.categoria))];
  const fp=useMemo(()=>{
    let res=mode==="view"?PRODUCTS.filter(p=>quantities[p.id]>0):PRODUCTS;
    if(cat!=="Tutte")res=res.filter(p=>p.categoria===cat);
    if(search.trim()){const s=search.toLowerCase();res=res.filter(p=>p.nome.toLowerCase().includes(s));}
    return res;
  },[cat,search,mode,quantities,PRODUCTS]);
  function setQ(pid,q){ if(!editable)return; setQuantities(p=>{const n={...p}; if(q<=0)delete n[pid]; else n[pid]=q; return n;}); }
  function save(){ const items=Object.entries(quantities).map(([pid,q])=>({product_id:parseInt(pid),quantity:q})); onSave({...order,items}); toast("Ordine aggiornato","success"); }
  return (
    <Modal open onClose={onClose} size="xl"
      title={`${editable?"Modifica":"Riepilogo"} — ${order.operator_nome} ${order.operator_cognome}`}
      footer={<div className="flex gap-2">
        <button onClick={onClose} className="px-4 py-2 bg-slate-100 hover:bg-slate-200 rounded-lg">Chiudi</button>
        {editable&&<button onClick={save} className="px-4 py-2 bg-blue-700 hover:bg-blue-800 text-white font-semibold rounded-lg">Salva</button>}
      </div>}>
      <div className="space-y-3">
        <div className="bg-slate-50 rounded-lg p-3 grid grid-cols-2 sm:grid-cols-4 gap-3 text-sm">
          {[["CDC",order.cdc],["Sede",order.site_nome],["Inviato",fmtDT(order.submitted_at)],["Totale",fmt(total)]].map(([l,v])=>(
            <div key={l}><div className="text-xs text-slate-500">{l}</div><div className="font-semibold text-xs">{v}</div></div>
          ))}
        </div>
        {editable&&(
          <div className="space-y-2">
            <div className="flex flex-wrap gap-1">{cats.map(c=>(
              <button key={c} onClick={()=>setCat(c)} className={`px-2.5 py-1 text-xs rounded-lg ${cat===c?'bg-blue-700 text-white':'bg-slate-100 text-slate-700'}`}>{c}</button>))}</div>
            <div className="relative"><Icon name="search" size={16} className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"/>
              <input type="text" value={search} onChange={e=>setSearch(e.target.value)} placeholder="Cerca…" className="w-full pl-9 pr-3 py-2 border border-slate-200 rounded-lg text-sm"/></div>
          </div>
        )}
        <div className="grid grid-cols-1 gap-2 max-h-96 overflow-y-auto scrollbar-thin">
          {fp.map(p=><ProductCard key={p.id} product={p} quantity={quantities[p.id]||0} onChange={q=>setQ(p.id,q)} locked={!editable}/>)}
          {fp.length===0&&<div className="text-center py-6 text-slate-400 text-sm">Nessun prodotto</div>}
        </div>
      </div>
    </Modal>
  );
}

// ── ADMIN DASHBOARD ───────────────────────────────────────────
function AdminDashboard({orders,operators,warehouse,products,externalOrders,onLogout,setOrders,setOperators,setWarehouse,setProducts,setExternalOrders}){
  const [tab,setTab]=useState("operators");
  const [mk,setMk]=useState(monthKey());
  const [viewOrd,setViewOrd]=useState(null);
  const [editOrd,setEditOrd]=useState(null);
  const [delOrd,setDelOrd]=useState(null);
  const [delConfirm,setDelConfirm]=useState("");
  const toast=useToast();

  function handleDelete(o){setDelOrd(o);setDelConfirm("");}
  function confirmDelete(){
    if(delConfirm!=="ELIMINA")return;
    setOrders(p=>p.filter(o=>!(o.operator_id===delOrd.operator_id&&o.month===delOrd.month)));
    toast("Ordine eliminato","success"); setDelOrd(null);
  }
  function handleSaveEdit(updated){ setOrders(p=>p.map(o=>(o.operator_id===updated.operator_id&&o.month===updated.month)?updated:o)); setEditOrd(null); }

  const months=useMemo(()=>{const s=new Set([monthKey()]);orders.forEach(o=>s.add(o.month));return Array.from(s).sort().reverse();},[orders]);

  // Ordini combinati: interni + esterni per il mese corrente (usati da Fornitore e Output)
  const allOrdersForMonth=useMemo(()=>{
    const extAsSynthetic=externalOrders.filter(o=>o.month===mk).map((eo,i)=>({
      operator_id:-1000-i, operator_nome:eo.sede, operator_cognome:'(sede esterna)',
      cdc:'Esterno', site_nome:eo.sede, month:mk, submitted_at:eo.imported_at,
      items:eo.items, _external:true
    }));
    return [...orders.filter(o=>o.month===mk), ...extAsSynthetic];
  },[orders,externalOrders,mk]);

  const extCountForMonth=externalOrders.filter(o=>o.month===mk).length;

  const tabs=[
    {id:"operators",label:"Per Operatore",icon:"users"},
    {id:"suppliers",label:"Per Fornitore",icon:"package"},
    {id:"cdc",label:"Per CDC",icon:"briefcase"},
    {id:"outputs",label:"Output & Email",icon:"send"},
    {id:"warehouse",label:"Magazzino sede",icon:"archive"},
    {id:"importa",label:"Importa sedi",icon:"upload",badge:extCountForMonth>0?extCountForMonth:null},
    {id:"gestione-op",label:"Operatori",icon:"user-cog",admin:true},
    {id:"gestione-cat",label:"Catalogo",icon:"book-open",admin:true},
  ];

  return (
    <div className="min-h-screen bg-slate-100">
      <header className="bg-white shadow-sm sticky top-0 z-30">
        <div className="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between gap-4">
          <div className="flex items-center gap-3">
            <Logo className="h-10"/>
            <div className="hidden sm:block border-l border-slate-200 pl-3">
              <div className="text-xs text-slate-500 uppercase tracking-wider">Dashboard</div>
              <div className="font-semibold text-slate-900 text-sm">Amministrazione</div>
            </div>
          </div>
          <div className="flex items-center gap-3">
            <select value={mk} onChange={e=>setMk(e.target.value)} className="px-3 py-2 border border-slate-200 rounded-lg text-sm font-medium bg-white">
              {months.map(m=><option key={m} value={m}>{monthLabel(m)}</option>)}
            </select>
            <button onClick={onLogout} className="text-sm text-slate-500 hover:text-slate-800 flex items-center gap-1">
              <Icon name="log-out" size={16}/><span className="hidden sm:inline">Esci</span>
            </button>
          </div>
        </div>
        <div className="border-t border-slate-100 max-w-7xl mx-auto px-4 overflow-x-auto">
          <nav className="flex gap-0.5">
            {tabs.map(t=>{
              const isAdmin=!!t.admin;
              return (
                <button key={t.id} onClick={()=>setTab(t.id)}
                  className={`px-3.5 py-2.5 text-sm font-medium border-b-2 transition flex items-center gap-1.5 whitespace-nowrap relative ${
                    tab===t.id?(isAdmin?'border-amber-500 text-amber-700':'border-blue-700 text-blue-700')
                    :(isAdmin?'border-transparent text-amber-600/70 hover:text-amber-700':'border-transparent text-slate-500 hover:text-slate-800')
                  }`}>
                  <Icon name={t.icon} size={15}/>{t.label}
                  {t.badge&&<span className="text-[10px] font-bold bg-green-500 text-white px-1.5 py-0.5 rounded-full">{t.badge}</span>}
                  {isAdmin&&<span className="text-[9px] font-bold bg-amber-100 text-amber-700 px-1 rounded">GESTIONE</span>}
                </button>
              );
            })}
          </nav>
        </div>
      </header>

      <main className="max-w-7xl mx-auto px-4 py-6">
        {tab==="operators"&&<TabPerOperator orders={orders} operators={operators} mk={mk} onView={setViewOrd} onEdit={setEditOrd} onDelete={handleDelete}/>}
        {tab==="suppliers"&&<TabPerSupplier orders={allOrdersForMonth.map(o=>({...o,month:mk}))} mk={mk}/>}
        {tab==="cdc"&&<TabPerCDC orders={orders} operators={operators} mk={mk}/>}
        {tab==="outputs"&&<TabOutputs orders={allOrdersForMonth.map(o=>({...o,month:mk}))} mk={mk} extCount={extCountForMonth}/>}
        {tab==="warehouse"&&<TabWarehouse warehouse={warehouse} setWarehouse={setWarehouse}/>}
        {tab==="importa"&&<TabImportaOrdini externalOrders={externalOrders} setExternalOrders={setExternalOrders} mk={mk}/>}
        {tab==="gestione-op"&&<TabGestioneOperatori operators={operators} setOperators={setOperators}/>}
        {tab==="gestione-cat"&&<TabGestioneCatalogo products={products} setProducts={setProducts}/>}
      </main>

      {viewOrd&&<OrderViewModal order={viewOrd} mode="view" onClose={()=>setViewOrd(null)}/>}
      {editOrd&&<OrderViewModal order={editOrd} mode="edit" onClose={()=>setEditOrd(null)} onSave={handleSaveEdit}/>}

      <Modal open={!!delOrd} onClose={()=>setDelOrd(null)} title="Eliminare l'ordine?" size="sm"
        footer={<><button onClick={()=>setDelOrd(null)} className="px-4 py-2 bg-slate-100 hover:bg-slate-200 rounded-lg">Annulla</button>
          <button onClick={confirmDelete} disabled={delConfirm!=="ELIMINA"} className="px-4 py-2 bg-red-600 hover:bg-red-700 disabled:bg-slate-300 text-white font-semibold rounded-lg">Elimina</button></>}>
        {delOrd&&<div className="space-y-3 text-sm">
          <div className="bg-red-50 border border-red-200 rounded-lg p-3 flex items-start gap-2">
            <Icon name="alert-triangle" size={18} className="text-red-700 flex-shrink-0 mt-0.5"/>
            <div className="text-red-900 text-xs"><strong className="block mb-1">Operazione irreversibile</strong>Elimini l'ordine di <strong>{delOrd.operator_nome} {delOrd.operator_cognome}</strong> per {monthLabel(delOrd.month)}. L'operatore potrà re-inviare.</div>
          </div>
          <div><label className="block text-sm font-medium text-slate-700 mb-1">Scrivi <strong>ELIMINA</strong> per confermare</label>
            <input type="text" value={delConfirm} onChange={e=>setDelConfirm(e.target.value.toUpperCase())} autoFocus className="w-full px-3 py-2 border border-slate-300 rounded-lg uppercase font-mono"/></div>
        </div>}
      </Modal>
    </div>
  );
}

// ── MAIN APP ──────────────────────────────────────────────────
function App(){
  const [view,setView]=useState("landing");
  const [operators,setOperatorsState]=useState(()=>load(SK.OPERATORS,null)||OPERATORS_SEED);
  const [orders,setOrdersState]=useState(()=>load(SK.ORDERS,[]));
  const [warehouse,setWarehouseState]=useState(()=>load(SK.WAREHOUSE,{}));
  const [products,setProductsState]=useState(()=>load(SK.PRODUCTS,null)||PRODUCTS_SEED);
  const [externalOrders,setExtOrdersState]=useState(()=>load("fin_ext_orders",[]));
  const [currentOp,setCurrentOp]=useState(null);
  const [currentSite,setCurrentSite]=useState(null);

  function setOperators(v){ setOperatorsState(v); save(SK.OPERATORS,typeof v==="function"?v(operators):v); }
  function setOrders(v){ const nv=typeof v==="function"?v(orders):v; setOrdersState(nv); save(SK.ORDERS,nv); }
  function setWarehouse(v){ const nv=typeof v==="function"?v(warehouse):v; setWarehouseState(nv); save(SK.WAREHOUSE,nv); }
  function setProducts(v){ const nv=typeof v==="function"?v(products):v; setProductsState(nv); save(SK.PRODUCTS,nv); }
  function setExternalOrders(v){ const nv=typeof v==="function"?v(externalOrders):v; setExtOrdersState(nv); save("fin_ext_orders",nv); }

  useEffect(()=>{ if(window.lucide)window.lucide.createIcons(); });

  function handleOpLogin(op){
    const existing=operators.find(o=>o.id===op.id);
    if(!existing.password&&op.password){ setOperators(p=>p.map(o=>o.id===op.id?{...o,password:op.password}:o)); }
    setCurrentOp(op); setView("op-site");
  }
  function handleOrderSubmit(order){
    setOrders(p=>[...p.filter(o=>!(o.operator_id===order.operator_id&&o.month===order.month)),order]);
    setView("op-form");
  }
  function logout(){ setCurrentOp(null); setCurrentSite(null); setView("landing"); }

  const existingOrder=useMemo(()=>{
    if(!currentOp)return null;
    return orders.find(o=>o.operator_id===currentOp.id&&o.month===monthKey())||null;
  },[currentOp,orders]);

  return (
    <ProductsCtx.Provider value={products}>
      <ToastProvider>
        {view==="landing"&&<LandingPage onChoice={c=>setView(c==="operator"?"op-login":"admin-login")}/>}
        {view==="op-login"&&<OperatorLogin operators={operators} onLogin={handleOpLogin} onBack={()=>setView("landing")}/>}
        {view==="op-site"&&currentOp&&<SiteSelection operator={currentOp} onSelect={s=>{setCurrentSite(s);setView("op-form");}} onLogout={logout}/>}
        {view==="op-form"&&currentOp&&currentSite&&(
          <OrderForm operator={currentOp} site={currentSite} existingOrder={existingOrder}
            onSubmit={handleOrderSubmit} onLogout={logout} onChangeSite={()=>setView("op-site")}/>
        )}
        {view==="admin-login"&&<AdminLogin onLogin={()=>setView("admin")} onBack={()=>setView("landing")}/>}
        {view==="admin"&&(
          <AdminDashboard orders={orders} operators={operators} warehouse={warehouse} products={products}
            externalOrders={externalOrders} onLogout={logout}
            setOrders={setOrders} setOperators={setOperators} setWarehouse={setWarehouse}
            setProducts={setProducts} setExternalOrders={setExternalOrders}/>
        )}
      </ToastProvider>
    </ProductsCtx.Provider>
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
