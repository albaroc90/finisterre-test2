function getProductLimit(prodotto) {
  if (prodotto.categoria === "Garze & Medicazioni") return 10;

    const n = prodotto.nome.toUpperCase();

}

function monthKey(d=new Date()){ return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`; }
function monthLabel(mk){ const months=["Gennaio","Febbraio","Marzo","Aprile","Maggio","Giugno","Luglio","Agosto","Settembre","Ottobre","Novembre","Dicembre"]; const[y,m]=mk.split("-"); return `${months[+m-1]} ${y}`; }
function fmt(n){ return new Intl.NumberFormat('it-IT',{style:'currency',currency:'EUR'}).format(n||0); }
function fmtDT(iso){ if(!iso)return"—"; return new Date(iso).toLocaleString('it-IT',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}); }
function norm(s){ return (s||"").toUpperCase().trim().replace(/\s+/g," "); }
function findOp(ops,nome,cog){ return ops.find(o=>norm(o.nome)===norm(nome)&&norm(o.cognome)===norm(cog)); }
function dl(content,name,mime="text/csv;charset=utf-8"){ const b=new Blob([content],{type:mime}); const u=URL.createObjectURL(b); const a=document.createElement("a"); a.href=u; a.download=name; document.body.appendChild(a); a.click(); document.body.removeChild(a); setTimeout(()=>URL.revokeObjectURL(u),100); }
function genId(arr){ return arr.length?Math.max(...arr.map(x=>x.id||0))+1:1; }

function Icon({name,size=20,className=""}){
  const ref=useRef(null);
  useEffect(()=>{ if(ref.current&&window.lucide){ ref.current.innerHTML=""; const i=document.createElement("i"); i.setAttribute("data-lucide",name); ref.current.appendChild(i); window.lucide.createIcons({nodes:[ref.current]}); } },[name]);
  return <span ref={ref} className={`inline-flex items-center justify-center ${className}`} style={{width:size,height:size}}></span>;
}

// ── TOAST ─────────────────────────────────────────────────────
const ToastCtx = createContext(null);
function ToastProvider({children}){
  const [toasts,setToasts]=useState([]);
  const show=useCallback((msg,type="info",dur=3500)=>{ const id=Date.now()+Math.random(); setToasts(p=>[...p,{id,msg,type}]); setTimeout(()=>setToasts(p=>p.filter(t=>t.id!==id)),dur); },[]);
  return (
    <ToastCtx.Provider value={show}>
      {children}
      <div className="fixed top-4 right-4 z-50 space-y-2 max-w-xs">
        {toasts.map(t=>(
          <div key={t.id} className={`toast rounded-lg shadow-lg px-4 py-3 text-sm font-medium flex items-center gap-2 ${t.type==="success"?"bg-green-600 text-white":t.type==="error"?"bg-red-600 text-white":t.type==="warning"?"bg-amber-500 text-white":"bg-slate-800 text-white"}`}>
            <Icon name={t.type==="success"?"check-circle":t.type==="error"?"x-circle":t.type==="warning"?"alert-triangle":"info"} size={18}/>
            <span>{t.msg}</span>
          </div>
        ))}
      </div>
    </ToastCtx.Provider>
  );
}
function useToast(){ return useContext(ToastCtx); }

function OperatorLogin({operators,onLogin,onBack}){
  const [step,setStep]=useState("name");
  const [nome,setNome]=useState("");
  const [cognome,setCognome]=useState("");
  const [password,setPassword]=useState("");
  const [password2,setPassword2]=useState("");
  const [matched,setMatched]=useState(null);
  const [error,setError]=useState("");
  const toast=useToast();

  function submitName(e){
    e.preventDefault(); setError("");
    const found=findOp(operators,nome,cognome);
    if(!found){ setError("Nome o cognome non trovato. Verifica con l'amministrazione."); return; }
    setMatched(found);
    setStep(found.password?"password":"create");
  }
  function submitPassword(e){
    e.preventDefault(); setError("");
    if(matched.password!==password){ setError("Password errata."); return; }
    onLogin(matched);
  }
  function createPassword(e){
    e.preventDefault(); setError("");
    if(password.length<4){ setError("Minimo 4 caratteri."); return; }
    if(password!==password2){ setError("Le password non coincidono."); return; }
    onLogin({...matched,password});
    toast("Password creata. Benvenuto/a!","success");
  }

  return (
    <div className="min-h-screen flex flex-col items-center justify-center p-6 fgrad">
      <div className="max-w-md w-full">
        <div className="bg-white rounded-2xl shadow-2xl p-8 fade-in">

          {/* Tab label "Login Operatore" */}

            <Icon name="user-circle" size={18} className="text-blue-700"/>
            <span className="text-sm font-semibold text-blue-900">Login Operatore</span>
          </div>

          <button onClick={onBack} className="text-slate-500 hover:text-slate-700 text-sm flex items-center gap-1 mb-4">
            <Icon name="arrow-left" size={16}/> Indietro
          </button>

          {step==="name"&&(
            <form onSubmit={submitName} className="space-y-4">
              <p className="text-sm text-slate-500">Inserisci nome e cognome come registrati nell'elenco operatori.</p>
              <div><label className="block text-sm font-medium text-slate-700 mb-1">Nome</label>
                <input type="text" value={nome} onChange={e=>setNome(e.target.value)} required autoFocus
                  className="w-full px-4 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 uppercase"/></div>
              <div><label className="block text-sm font-medium text-slate-700 mb-1">Cognome</label>
                <input type="text" value={cognome} onChange={e=>setCognome(e.target.value)} required
                  className="w-full px-4 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 uppercase"/></div>
              {error&&<p className="text-red-600 text-sm">{error}</p>}
              <button type="submit" className="w-full py-3 bg-blue-700 hover:bg-blue-800 text-white font-semibold rounded-lg">Continua</button>
            </form>
          )}
          {step==="password"&&(
            <form onSubmit={submitPassword} className="space-y-4">
              <p className="text-sm text-slate-600">Ciao <strong>{matched.nome}</strong>, inserisci la tua password.</p>
              <div><label className="block text-sm font-medium text-slate-700 mb-1">Password</label>
                <input type="password" value={password} onChange={e=>setPassword(e.target.value)} required autoFocus
                  className="w-full px-4 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500"/></div>
              {error&&<p className="text-red-600 text-sm">{error}</p>}
              <div className="flex gap-2">
                <button type="button" onClick={()=>{setStep("name");setPassword("");}} className="flex-1 py-3 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-lg">Indietro</button>
                <button type="submit" className="flex-1 py-3 bg-blue-700 hover:bg-blue-800 text-white font-semibold rounded-lg">Accedi</button>

          {step==="create"&&(

// ── PRODUCT CARD ──────────────────────────────────────────────
function ProductCard({product,quantity,onChange,locked}){
  const limit=getProductLimit(product);
  const isAtLimit=limit!==null&&quantity>=limit;
  const [limitMsg,setLimitMsg]=useState(false);

  function showLimit(){ setLimitMsg(true); setTimeout(()=>setLimitMsg(false),2800); }
  function inc(){ if(!locked){ if(isAtLimit){ showLimit(); return; } onChange(quantity+1); } }
  function dec(){ if(!locked&&quantity>0) onChange(quantity-1); }
  function setManual(v){
    if(locked)return;
    let n=parseInt(v)||0; if(n<0)n=0;
    if(limit!==null&&n>limit){ n=limit; showLimit(); }
    onChange(n);
  }

  return (
    <div className={`bg-white rounded-xl border p-3.5 transition relative ${quantity>0?'border-blue-400 shadow-sm bg-blue-50/20':'border-slate-200'}`}>
      {limitMsg&&(
        <div className="limit-banner absolute top-2 left-1/2 -translate-x-1/2 bg-amber-500 text-white text-xs font-semibold px-3 py-1.5 rounded-full shadow-md z-10 whitespace-nowrap">
          Quantità massima: {limit} unità
        </div>
      )}
      <div className="flex items-center gap-3">
        <div className="flex-1 min-w-0">
          <div className="font-medium text-slate-900 text-sm leading-tight">{product.nome}</div>
          <div className="flex items-center gap-2 mt-1 flex-wrap">
            {product.codice&&<span className="text-[10px] font-mono bg-slate-100 text-slate-600 px-1.5 py-0.5 rounded">cod. {product.codice}</span>}
            <span className="text-xs text-slate-500">{product.pezzi_confezione>1?`${product.pezzi_confezione} pz/conf`:'pezzo singolo'}</span>
            {product.prescrizione&&<span className="inline-flex items-center gap-1 text-[10px] font-semibold bg-amber-100 text-amber-800 px-1.5 py-0.5 rounded"><Icon name="file-text" size={10}/> Prescrizione</span>}
            {limit!==null&&<span className="inline-flex items-center gap-1 text-[10px] font-semibold bg-slate-100 text-slate-600 px-1.5 py-0.5 rounded"><Icon name="alert-circle" size={10}/> Max {limit}</span>}
          </div>
        </div>
        <div className="flex items-center gap-1 flex-shrink-0">
          <button onClick={dec} disabled={locked||quantity===0} className="w-8 h-8 rounded-lg bg-slate-100 hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed flex items-center justify-center text-slate-700">
            <Icon name="minus" size={16}/>
          </button>
          <input type="number" value={quantity} onChange={e=>setManual(e.target.value)} disabled={locked} min="0"
            className="w-12 text-center border border-slate-200 rounded-lg py-1 text-sm font-semibold disabled:bg-slate-50 focus:ring-2 focus:ring-blue-400 focus:border-transparent"/>
          <button onClick={inc} disabled={locked} className={`w-8 h-8 rounded-lg flex items-center justify-center text-white ${isAtLimit?'bg-amber-400 hover:bg-amber-500':'bg-blue-600 hover:bg-blue-700'} disabled:opacity-40 disabled:cursor-not-allowed`}>
            <Icon name="plus" size={16}/>
          </button>
        </div>
      </div>
    </div>
  );
}

  const [showConfirm,setShowConfirm]=useState(false);
  const toast=useToast();

  const mk=monthKey(); const ml=monthLabel(mk);
  const submitted=!!existingOrder;
  // Deadline: DEADLINE_DAY = null significa disabilitato
  const deadlinePassed=DEADLINE_DAY!==null&&new Date().getDate()>DEADLINE_DAY;
  const formLocked=submitted||deadlinePassed;

  const categories=useMemo(()=>["Tutte",...new Set(PRODUCTS.map(p=>p.categoria))],[PRODUCTS]);
  const filteredProducts=useMemo(()=>{
    let res=PRODUCTS;
    if(activeCategory!=="Tutte")res=res.filter(p=>p.categoria===activeCategory);
    if(search.trim()){ const s=search.toLowerCase(); res=res.filter(p=>p.nome.toLowerCase().includes(s)||(p.codice&&p.codice.toLowerCase().includes(s))); }
    return res;
  },[activeCategory,search,PRODUCTS]);

  const totalItems=useMemo(()=>Object.values(quantities).reduce((a,b)=>a+b,0),[quantities]);

  function setQ(pid,q){
    if(formLocked)return;
    setQuantities(prev=>{ const n={...prev}; if(q<=0)delete n[pid]; else n[pid]=q; return n; });
  }

  function handleSubmit(){ if(totalItems===0){toast("Aggiungi almeno un prodotto.","warning");return;} setShowConfirm(true); }
  function confirmSubmit(){
    const items=Object.entries(quantities).map(([pid,q])=>({product_id:parseInt(pid),quantity:q}));
    onSubmit({ operator_id:operator.id, operator_nome:operator.nome, operator_cognome:operator.cognome, cdc:operator.cdc, site_id:site.id, site_nome:site.nome, month:mk, submitted_at:new Date().toISOString(), items });
    setShowConfirm(false);
  }
  const hasPrescription=useMemo(()=>{ const pm={}; PRODUCTS.forEach(p=>pm[p.id]=p); return Object.keys(quantities).some(pid=>{const p=pm[pid];return p&&p.prescrizione&&quantities[pid]>0;}); },[quantities,PRODUCTS]);

  return (
    <div className="min-h-screen bg-slate-100 flex flex-col">
      <header className="bg-white shadow-sm sticky top-0 z-30">
        <div className="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between gap-4">
          <Logo className="h-10"/>
          <div className="hidden md:flex items-center gap-4 text-sm">
            <span className="flex items-center gap-1.5 text-slate-600"><Icon name="user" size={16}/>{operator.nome} {operator.cognome}</span>
            <span className="flex items-center gap-1.5 text-slate-600"><Icon name="map-pin" size={16}/>{site.nome}
              {!formLocked&&<button onClick={onChangeSite} className="text-blue-600 hover:underline text-xs ml-1">cambia</button>}
            </span>
          </div>
          <button onClick={onLogout} className="text-sm text-slate-500 hover:text-slate-800 flex items-center gap-1"><Icon name="log-out" size={16}/><span className="hidden sm:inline">Esci</span></button>
        </div>
      </header>

      {submitted&&(
        <div className="bg-green-50 border-b border-green-200 px-4 py-3">
          <div className="max-w-6xl mx-auto flex items-start gap-2 text-sm">
            <Icon name="check-circle-2" size={20} className="text-green-700 flex-shrink-0 mt-0.5"/>
            <div><div className="font-semibold text-green-900">Ordine inviato per {ml}</div>
              <div className="text-green-700 text-xs mt-0.5">Sola lettura. Per variazioni contatta l'amministrazione.</div></div>
          </div>
        </div>
      )}
      {!submitted&&deadlinePassed&&(
        <div className="bg-red-50 border-b border-red-200 px-4 py-3">
          <div className="max-w-6xl mx-auto flex items-start gap-2 text-sm">
            <Icon name="lock" size={20} className="text-red-700 flex-shrink-0 mt-0.5"/>
            <div><div className="font-semibold text-red-900">Ordini chiusi — deadline del {DEADLINE_DAY} superata</div>
              <div className="text-red-700 text-xs mt-0.5">Per integrazioni contatta l'amministrazione.</div></div>
          </div>
        </div>
      )}

      <div className="flex-1 max-w-6xl mx-auto px-4 py-6 w-full grid grid-cols-1 lg:grid-cols-[240px_1fr] gap-5">
        <aside>
          <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-3 sticky top-20">
            <div className="text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2 px-2">Categorie</div>
            <nav className="space-y-0.5">
              {categories.map(cat=>{
                const count=cat==="Tutte"?PRODUCTS.length:PRODUCTS.filter(p=>p.categoria===cat).length;
                const active=activeCategory===cat;
                return (
                  <button key={cat} onClick={()=>setActiveCategory(cat)}
                    className={`w-full text-left px-3 py-2 rounded-lg text-sm flex items-center justify-between transition ${active?'bg-blue-700 text-white font-semibold':'text-slate-700 hover:bg-slate-100'}`}>
                    <span className="truncate">{cat}</span>
                    <span className={`text-xs ${active?'text-blue-100':'text-slate-400'}`}>{count}</span>
                  </button>
                );
              })}
            </nav>
          </div>
        </aside>

        <main>
          <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-4 mb-4">
            <div className="flex items-center justify-between gap-3 flex-wrap mb-4">
              <div>
                <div className="text-xs text-slate-500 uppercase tracking-wider">Ordine farmacia</div>
                <h1 className="text-xl font-bold text-slate-900">{ml}</h1>
              </div>
              <div className="flex items-center gap-2 text-sm bg-slate-50 px-3 py-2 rounded-lg">
                <Icon name="shopping-bag" size={16} className="text-slate-500"/>
                <span className="text-slate-600">Selezionati:</span>
                <span className="font-bold text-slate-900">{totalItems} prodotti</span>
              </div>
            </div>
            <div className="relative">
              <Icon name="search" size={18} className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"/>
              <input type="text" value={search} onChange={e=>setSearch(e.target.value)}
                placeholder="Cerca per nome o codice articolo…"
                className="w-full pl-10 pr-4 py-2.5 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm"/>
            </div>
          </div>

          <div className="grid grid-cols-1 gap-2.5 mb-28">
            {filteredProducts.map(p=>(
              <ProductCard key={p.id} product={p} quantity={quantities[p.id]||0} onChange={q=>setQ(p.id,q)} locked={formLocked}/>
            ))}
            {filteredProducts.length===0&&(
              <div className="text-center py-12 text-slate-400">
                <Icon name="search-x" size={40} className="mx-auto mb-2"/>
                <div>Nessun prodotto trovato</div>
              </div>
            )}
          </div>
        </main>
      </div>

      {!formLocked&&(
        <div className="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 shadow-lg z-20">
          <div className="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between gap-4">
            <div className="flex items-center gap-3">
              <div className="bg-blue-50 rounded-lg px-4 py-2">
                <div className="text-xs text-slate-500">Prodotti selezionati</div>
                <div className="font-bold text-xl text-blue-700">{totalItems}</div>
              </div>
            </div>
            <button onClick={handleSubmit} disabled={totalItems===0}
              className="bg-blue-700 hover:bg-blue-800 disabled:bg-slate-300 text-white font-semibold py-3 px-6 rounded-lg flex items-center gap-2 transition shadow-md">

        </div>

      <Modal open={showConfirm} onClose={()=>setShowConfirm(false)} title="Conferma invio ordine"
        footer={<><button onClick={()=>setShowConfirm(false)} className="px-4 py-2 text-slate-600 hover:bg-slate-100 rounded-lg">Annulla</button>
          <button onClick={confirmSubmit} className="px-4 py-2 bg-blue-700 hover:bg-blue-800 text-white font-semibold rounded-lg">Conferma e invia</button></>}>
        <div className="space-y-3 text-sm">
          <p>Stai per inviare l'ordine farmacia per <strong>{ml}</strong>.</p>
          <div className="bg-slate-50 rounded-lg p-3 grid grid-cols-2 gap-2">
            <div><span className="text-slate-500">Operatore:</span> <strong>{operator.nome} {operator.cognome}</strong></div>
            <div><span className="text-slate-500">Sede:</span> <strong>{site.nome}</strong></div>
            <div><span className="text-slate-500">Prodotti selezionati:</span> <strong>{totalItems}</strong></div>
          </div>
          {hasPrescription&&(
            <div className="bg-amber-50 border border-amber-200 rounded-lg p-3 text-amber-900 flex items-start gap-2">
              <Icon name="alert-triangle" size={18} className="flex-shrink-0 mt-0.5"/>
              <div><div className="font-semibold mb-1">Prodotti su prescrizione specialistica</div>
                <div className="text-xs">Dopo l'invio, manda foto della prescrizione a <strong>insubria@finisterre.medicair.it</strong></div></div>
            </div>
          )}
          <p className="text-xs text-slate-500">Una volta inviato, l'ordine sarà in sola lettura.</p>
        </div>
      </Modal>
    </div>
  );
}

// ── ADMIN: PER OPERATORE ──────────────────────────────────────
function TabPerOperator({orders,operators,mk,onDelete,onView,onEdit}){
  const PRODUCTS=useProducts();
  const mo=orders.filter(o=>o.month===mk);
  const byId={}; mo.forEach(o=>{byId[o.operator_id]=o;});
  const [statusFilter,setStatusFilter]=useState("all");
  const [cdcFilter,setCdcFilter]=useState("all");
  const [sedeFilter,setSedeFilter]=useState("all");

  const cdcs=useMemo(()=>["all",...new Set(operators.map(o=>o.cdc))]  ,[operators]);
  const sedi=useMemo(()=>["all",...new Set(operators.map(o=>o.sede_ritiro).filter(Boolean))]  ,[operators]);

  const sent=mo.length; const pending=operators.length-sent;
  function orderTotal(order){ return order.items.reduce((s,it)=>{const p=PRODUCTS.find(pp=>pp.id===it.product_id); return s+(p?p.prezzo*it.quantity:0);},0); }
  function orderItems(order){ return order.items.reduce((s,it)=>s+it.quantity,0); }

  const list=useMemo(()=>operators.map(op=>({op,order:byId[op.id]||null})).filter(({op,order})=>{
    if(statusFilter==="sent"&&!order)return false;
    if(statusFilter==="pending"&&order)return false;
    if(cdcFilter!=="all"&&op.cdc!==cdcFilter)return false;
    if(sedeFilter!=="all"&&op.sede_ritiro!==sedeFilter)return false;
    return true;
  }),[operators,byId,statusFilter,cdcFilter,sedeFilter]);

  return (
    <div>
      {/* Stats */}
      <div className="grid grid-cols-1 sm:grid-cols-3 gap-3 mb-4">
        {[{label:"Totali",val:operators.length,icon:"users",bg:"bg-slate-100",tc:"text-slate-900"},
          {label:"Inviati",val:sent,icon:"check-circle-2",bg:"bg-green-100",tc:"text-green-700"},
          {label:"In attesa",val:pending,icon:"clock",bg:"bg-amber-100",tc:"text-amber-700"}].map(s=>(
          <div key={s.label} className="bg-white rounded-xl border border-slate-200 p-4 flex items-center gap-3">
            <div className={`${s.bg} rounded-lg p-2`}><Icon name={s.icon} size={22} className={s.tc}/></div>
            <div><div className="text-xs text-slate-500">{s.label}</div><div className={`text-2xl font-bold ${s.tc}`}>{s.val}</div></div>
          </div>
        ))}
      </div>

      {/* Filtri */}
      <div className="bg-white rounded-xl border border-slate-200 p-3 mb-3 flex flex-wrap gap-3 items-center">
        <div className="flex items-center gap-1.5 text-sm">
          <Icon name="filter" size={15} className="text-slate-400"/>
          <span className="text-slate-500 font-medium">Stato:</span>
          {[["all","Tutti"],["sent","Inviati"],["pending","In attesa"]].map(([v,l])=>(
            <button key={v} onClick={()=>setStatusFilter(v)} className={`px-2.5 py-1 rounded-lg text-xs font-medium ${statusFilter===v?'bg-blue-700 text-white':'bg-slate-100 text-slate-700 hover:bg-slate-200'}`}>{l}</button>
          ))}
        </div>
        <div className="flex items-center gap-1.5 text-sm">
          <span className="text-slate-500 font-medium">CDC:</span>
          <select value={cdcFilter} onChange={e=>setCdcFilter(e.target.value)} className="px-2 py-1 border border-slate-200 rounded-lg text-xs bg-white">
            <option value="all">Tutti i CDC</option>
            {cdcs.filter(c=>c!=="all").map(c=><option key={c} value={c}>{c}</option>)}
          </select>
        </div>
        {sedi.length>1&&(
          <div className="flex items-center gap-1.5 text-sm">
            <span className="text-slate-500 font-medium">Sede ritiro:</span>
            <select value={sedeFilter} onChange={e=>setSedeFilter(e.target.value)} className="px-2 py-1 border border-slate-200 rounded-lg text-xs bg-white">
              <option value="all">Tutte le sedi</option>
              {sedi.filter(s=>s!=="all").map(s=><option key={s} value={s}>{s}</option>)}
            </select>
          </div>
        )}
        {(statusFilter!=="all"||cdcFilter!=="all"||sedeFilter!=="all")&&(
          <button onClick={()=>{setStatusFilter("all");setCdcFilter("all");setSedeFilter("all");}} className="text-xs text-blue-600 hover:underline ml-auto">Azzera filtri</button>
        )}
      </div>

      {/* Tabella */}
      <div className="bg-white rounded-xl border border-slate-200 overflow-hidden">
        <div className="overflow-x-auto">
          <table className="w-full text-sm">
            <thead className="bg-slate-50 border-b border-slate-200">
              <tr>{["Stato","Operatore","CDC","Sede ritiro","Ritiro ordine","Inviato","Pz","Totale","Azioni"].map(h=>(
                <th key={h} className={`px-4 py-3 font-semibold text-slate-700 ${["Azioni","Totale","Pz"].includes(h)?"text-right":"text-left"}`}>{h}</th>))}
              </tr>
            </thead>
            <tbody>
              {list.map(({op,order})=>{
                const tot=order?orderTotal(order):0; const pz=order?orderItems(order):0;
                return (
                  <tr key={op.id} className="border-b border-slate-100 hover:bg-slate-50/50">
                    <td className="px-4 py-3">
                      {order
                        ?<span className="inline-flex items-center gap-1 text-xs font-semibold bg-green-100 text-green-800 px-2 py-1 rounded-full"><span className="w-1.5 h-1.5 rounded-full bg-green-500"></span>Inviato</span>
                        :<span className="inline-flex items-center gap-1 text-xs font-semibold bg-red-100 text-red-800 px-2 py-1 rounded-full"><span className="w-1.5 h-1.5 rounded-full bg-red-500"></span>In attesa</span>}
                    </td>
                    <td className="px-4 py-3 font-medium text-slate-900">{op.nome} {op.cognome}</td>
                    <td className="px-4 py-3 text-slate-600">{op.cdc}</td>
                    <td className="px-4 py-3 text-slate-600 text-xs">{op.sede_ritiro||<span className="text-slate-300 italic">—</span>}</td>
                    <td className="px-4 py-3 text-slate-600 text-xs">{order?order.site_nome:"—"}</td>
                    <td className="px-4 py-3 text-slate-500 text-xs">{order?fmtDT(order.submitted_at):"—"}</td>
                    <td className="px-4 py-3 text-right font-semibold">{order?pz:"—"}</td>
                    <td className="px-4 py-3 text-right font-semibold text-blue-700">{order?fmt(tot):"—"}</td>
                    <td className="px-4 py-3 text-right">
                      {order&&<div className="flex items-center justify-end gap-1">
                        <button onClick={()=>onView(order)} className="p-1.5 text-slate-500 hover:text-blue-700 hover:bg-blue-50 rounded" title="Vedi"><Icon name="eye" size={16}/></button>
                        <button onClick={()=>onEdit(order)} className="p-1.5 text-slate-500 hover:text-amber-700 hover:bg-amber-50 rounded" title="Modifica"><Icon name="edit-3" size={16}/></button>
                        <button onClick={()=>onDelete(order)} className="p-1.5 text-slate-500 hover:text-red-700 hover:bg-red-50 rounded" title="Elimina"><Icon name="trash-2" size={16}/></button>
                      </div>}
                    </td>
                  </tr>
                );
              })}
              {list.length===0&&<tr><td colSpan="9" className="text-center py-8 text-slate-400 text-sm">Nessun operatore trovato con i filtri selezionati</td></tr>}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

// ── ADMIN: PER FORNITORE ──────────────────────────────────────
function TabPerSupplier({orders,mk}){
  const PRODUCTS=useProducts();
  const mo=orders.filter(o=>o.month===mk);
  const agg=useMemo(()=>{
    const r={}; SUPPLIERS.forEach(s=>{r[s.nome]={supplier:s,items:{},total:0};});
    mo.forEach(order=>order.items.forEach(it=>{
      const p=PRODUCTS.find(pp=>pp.id===it.product_id); if(!p)return;
      const sup=r[p.fornitore]; if(!sup)return;
      if(!sup.items[p.id])sup.items[p.id]={product:p,quantity:0,total:0};
      sup.items[p.id].quantity+=it.quantity; sup.items[p.id].total+=p.prezzo*it.quantity; sup.total+=p.prezzo*it.quantity;
    }));
    return r;
  },[mo,PRODUCTS]);
  const [exp,setExp]=useState(null);

  return (
    <div className="space-y-3">
      {SUPPLIERS.map(s=>{
        const d=agg[s.nome]; const items=Object.values(d.items);
        const minOk=s.min_ordine===0||d.total>=s.min_ordine; const expanded=exp===s.nome;
        return (
          <div key={s.nome} className="bg-white rounded-xl border border-slate-200 overflow-hidden">
            <button onClick={()=>setExp(expanded?null:s.nome)} className="w-full px-4 py-3 flex items-center justify-between hover:bg-slate-50 transition">
              <div className="flex items-center gap-3 flex-1 min-w-0">
                <Icon name={expanded?"chevron-down":"chevron-right"} size={18} className="text-slate-400 flex-shrink-0"/>
                <div className="bg-blue-100 text-blue-700 rounded-lg w-10 h-10 flex items-center justify-center font-bold flex-shrink-0">{s.nome.substring(0,2).toUpperCase()}</div>
                <div className="text-left min-w-0"><div className="font-semibold text-slate-900 truncate">{s.nome}</div><div className="text-xs text-slate-500 truncate">{s.email}</div></div>
              </div>
              <div className="flex items-center gap-4 text-sm flex-shrink-0">
                <div className="text-right hidden sm:block"><div className="text-xs text-slate-500">Articoli</div><div className="font-semibold">{items.length}</div></div>
                <div className="text-right"><div className="text-xs text-slate-500">Totale</div><div className="font-bold text-blue-700">{fmt(d.total)}</div></div>
                {s.min_ordine>0&&<div className={`px-2 py-1 rounded-lg text-xs font-semibold ${minOk?'bg-green-100 text-green-800':'bg-red-100 text-red-800'}`}>Min {fmt(s.min_ordine)} {minOk?'✓':'✗'}</div>}
              </div>
            </button>
            {expanded&&(
              <div className="border-t border-slate-100 p-4">
                {items.length===0?<div className="text-center py-6 text-slate-400 text-sm">Nessun prodotto ordinato</div>:(
                  <div className="overflow-x-auto">
                    <table className="w-full text-sm">
                      <thead className="text-left text-xs text-slate-500 uppercase">
                        <tr><th className="py-2 pr-3">Codice</th><th className="py-2 pr-3">Prodotto</th><th className="py-2 pr-3 text-right">Q.tà</th><th className="py-2 pr-3 text-right">€/conf</th><th className="py-2 text-right">Totale</th></tr>
                      </thead>
                      <tbody>
                        {items.sort((a,b)=>a.product.nome.localeCompare(b.product.nome)).map(({product,quantity,total})=>(
                          <tr key={product.id} className="border-t border-slate-100">
                            <td className="py-2 pr-3 font-mono text-xs text-slate-500">{product.codice||"—"}</td>
                            <td className="py-2 pr-3">{product.nome}</td>
                            <td className="py-2 pr-3 text-right font-semibold">{quantity}</td>
                            <td className="py-2 pr-3 text-right text-slate-600">{fmt(product.prezzo)}</td>
                            <td className="py-2 text-right font-semibold">{fmt(total)}</td>
                          </tr>
                        ))}
                      </tbody>
                      <tfoot><tr className="border-t-2 border-slate-300"><td colSpan="4" className="py-2 text-right font-semibold">Totale:</td><td className="py-2 text-right font-bold text-blue-700">{fmt(d.total)}</td></tr></tfoot>
                    </table>
                  </div>
                )}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

// ── ADMIN: PER CDC ────────────────────────────────────────────
function TabPerCDC({orders,operators,mk}){
  const PRODUCTS=useProducts();
  const mo=orders.filter(o=>o.month===mk);
  const cdcs=[...new Set(operators.map(o=>o.cdc))];
  const stats=cdcs.map(cdc=>{
    const ops=operators.filter(o=>o.cdc===cdc);
    const sent=mo.filter(o=>o.cdc===cdc);
    const total=sent.reduce((s,ord)=>s+ord.items.reduce((ss,it)=>{const p=PRODUCTS.find(pp=>pp.id===it.product_id);return ss+(p?p.prezzo*it.quantity:0);},0),0);
    return {cdc,totale:ops.length,sent:sent.length,total};
  });
  function exportCsv(cdc){
    const rows=[["Codice","Prodotto","Fornitore","Q.tà","€/conf","Totale"]];
    const cdcOrd=mo.filter(o=>o.cdc===cdc); const agg={};
    cdcOrd.forEach(ord=>ord.items.forEach(it=>{ const p=PRODUCTS.find(pp=>pp.id===it.product_id); if(!p)return; if(!agg[p.id])agg[p.id]={p,q:0}; agg[p.id].q+=it.quantity; }));
    Object.values(agg).forEach(({p,q})=>rows.push([p.codice||"",p.nome,p.fornitore,q,p.prezzo.toFixed(2),(p.prezzo*q).toFixed(2)]));
    dl('\ufeff'+rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(';')).join('\n'),`CDC_${cdc.replace(/\s+/g,'_')}_${mk}.csv`);
  }
  return (
    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">
      {stats.map(s=>(
        <div key={s.cdc} className="bg-white rounded-xl border border-slate-200 p-4">

            <div><div className="text-xs text-slate-500 uppercase tracking-wider">CDC</div><h3 className="font-bold text-slate-900 text-lg">{s.cdc}</h3></div>
            <Icon name="briefcase" size={20} className="text-slate-400"/>

          <div className="space-y-2 text-sm">
            <div className="flex justify-between"><span className="text-slate-500">Operatori:</span><span className="font-semibold">{s.totale}</span></div>
            <div className="flex justify-between"><span className="text-slate-500">Ordini inviati:</span><span className="font-semibold text-green-700">{s.sent}/{s.totale}</span></div>
            <div className="flex justify-between border-t pt-2"><span className="text-slate-500">Spesa totale:</span><span className="font-bold text-blue-700">{fmt(s.total)}</span></div>
          </div>
          <button onClick={()=>exportCsv(s.cdc)} disabled={s.sent===0} className="mt-3 w-full py-2 text-sm bg-slate-900 hover:bg-black disabled:bg-slate-300 text-white rounded-lg flex items-center justify-center gap-2">
            <Icon name="download" size={16}/> Esporta CSV
          </button>
        </div>
      ))}
    </div>
  );
}

// ── ADMIN: OUTPUT & EMAIL ─────────────────────────────────────
function TabOutputs({orders,mk}){
  const PRODUCTS=useProducts();
  const mo=orders.filter(o=>o.month===mk); const ml=monthLabel(mk);
  const toast=useToast();
  const agg=useMemo(()=>{
    const r={}; SUPPLIERS.forEach(s=>{r[s.nome]={supplier:s,items:{},total:0};});
    mo.forEach(order=>order.items.forEach(it=>{
      const p=PRODUCTS.find(pp=>pp.id===it.product_id); if(!p)return;
      const sup=r[p.fornitore]; if(!sup)return;
      if(!sup.items[p.id])sup.items[p.id]={product:p,quantity:0};
      sup.items[p.id].quantity+=it.quantity; sup.total+=p.prezzo*it.quantity;
    }));
    return r;
  },[mo,PRODUCTS]);
  const [preview,setPreview]=useState(null);

  function emailBody(sn){ const d=agg[sn]; const items=Object.values(d.items).sort((a,b)=>a.product.nome.localeCompare(b.product.nome));
    let b=`Buongiorno,\n\nin allegato l'ordine farmacia di ${ml}:\n\n`;
    items.forEach(({product,quantity})=>{b+=`• ${product.codice?`[${product.codice}] `:''}${product.nome} — q.tà: ${quantity}\n`;});
    b+=`\nTotale ordine: ${fmt(d.total)}\n\nCordiali saluti,\nFinisterre · Cure Domiciliari ATS Insubria`; return b; }

  function openMail(s){ const d=agg[s.nome]; if(!Object.keys(d.items).length){toast("Nessun prodotto per questo fornitore","warning");return;}
    const sub=`Ordine farmacia ${ml} - Finisterre Insubria`;
    const cc=s.cc?`&cc=${encodeURIComponent(s.cc)}`:'';
    window.location.href=`mailto:${s.email}?subject=${encodeURIComponent(sub)}${cc}&body=${encodeURIComponent(emailBody(s.nome))}`; }

  function exportXls(sn){ const d=agg[sn]; const items=Object.values(d.items).sort((a,b)=>a.product.nome.localeCompare(b.product.nome));
    if(!items.length){toast("Nessun prodotto","warning");return;}
    let h=`<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel"><head><meta charset="UTF-8"></head><body><table border="1"><thead><tr><th colspan="6">${sn} — Ordine ${ml}</th></tr><tr><th>Codice</th><th>Prodotto</th><th>Pz/conf</th><th>Quantità</th><th>€/conf</th><th>Totale</th></tr></thead><tbody>`;
    items.forEach(({product,quantity})=>{h+=`<tr><td>${product.codice||''}</td><td>${product.nome}</td><td>${product.pezzi_confezione}</td><td>${quantity}</td><td>${product.prezzo.toFixed(4)}</td><td>${(product.prezzo*quantity).toFixed(2)}</td></tr>`;});
    h+=`<tr><td colspan="5"><b>TOTALE</b></td><td><b>${d.total.toFixed(2)}</b></td></tr></tbody></table></body></html>`;
    dl(h,`${sn.replace(/\s+/g,'_')}_${mk}.xls`,"application/vnd.ms-excel"); }

  function exportCsv(sn){ const d=agg[sn]; const items=Object.values(d.items).sort((a,b)=>a.product.nome.localeCompare(b.product.nome));
    if(!items.length){toast("Nessun prodotto","warning");return;}
    const rows=[["Codice","Prodotto","Pz/conf","Quantità","€/conf","Totale"]];
    items.forEach(({product,quantity})=>rows.push([product.codice||'',product.nome,product.pezzi_confezione,quantity,product.prezzo.toFixed(4),(product.prezzo*quantity).toFixed(2)]));
    rows.push(['','','','','TOTALE',d.total.toFixed(2)]);
    dl('\ufeff'+rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(';')).join('\n'),`${sn.replace(/\s+/g,'_')}_${mk}.csv`); }

  return (
    <div className="space-y-3">
      <div className="bg-blue-50 border border-blue-200 rounded-xl p-4 text-sm text-blue-900 flex items-start gap-2">
        <Icon name="info" size={18} className="flex-shrink-0 mt-0.5"/>
        <div><div className="font-semibold mb-0.5">Workflow</div>
          <div className="text-xs">Per ogni fornitore: <strong>1)</strong> Export Excel da allegare · <strong>2)</strong> Apri email pre-compilata in Outlook · <strong>3)</strong> Allega il file e invia</div></div>
      </div>
      {SUPPLIERS.map(s=>{ const d=agg[s.nome]; const items=Object.values(d.items); const isEmpty=items.length===0;
        const minOk=s.min_ordine===0||d.total>=s.min_ordine;
        return (
          <div key={s.nome} className={`bg-white rounded-xl border border-slate-200 p-4 ${isEmpty?'opacity-55':''}`}>
            <div className="flex items-center justify-between gap-3 flex-wrap">
              <div className="flex items-center gap-3 min-w-0">
                <div className="bg-blue-100 text-blue-700 rounded-lg w-10 h-10 flex items-center justify-center font-bold flex-shrink-0">{s.nome.substring(0,2).toUpperCase()}</div>
                <div className="min-w-0"><div className="font-semibold text-slate-900 truncate">{s.nome}</div><div className="text-xs text-slate-500 truncate">→ {s.email}</div></div>
              </div>
              <div className="flex items-center gap-4 text-sm flex-shrink-0">
                <div className="text-right"><div className="text-xs text-slate-500">{items.length} art.</div><div className="font-bold text-blue-700">{fmt(d.total)}</div></div>
                {s.min_ordine>0&&!isEmpty&&<div className={`px-2 py-1 rounded-lg text-xs font-semibold ${minOk?'bg-green-100 text-green-800':'bg-red-100 text-red-800'}`}>{minOk?'✓ min OK':`Sotto min ${fmt(s.min_ordine)}`}</div>}
              </div>
            </div>
            <div className="flex gap-2 mt-3 flex-wrap">
              {[{l:"Anteprima",i:"eye",fn:()=>setPreview(s),c:"slate-100 text-slate-700"},
                {l:"Excel",i:"file-spreadsheet",fn:()=>exportXls(s.nome),c:"green-600 text-white"},
                {l:"CSV",i:"download",fn:()=>exportCsv(s.nome),c:"slate-700 text-white"},
                {l:"Apri email",i:"mail",fn:()=>openMail(s),c:"blue-700 text-white"}].map(b=>(
                <button key={b.l} onClick={b.fn} disabled={isEmpty}
                  className={`px-3 py-2 text-sm bg-${b.c} hover:opacity-90 disabled:opacity-40 rounded-lg flex items-center gap-1.5`}>
                  <Icon name={b.i} size={15}/>{b.l}
                </button>
              ))}
            </div>
          </div>
        );
      })}
      <Modal open={!!preview} onClose={()=>setPreview(null)} title={preview?`Anteprima: ${preview.nome}`:''} size="lg"
        footer={<button onClick={()=>setPreview(null)} className="px-4 py-2 bg-slate-100 rounded-lg">Chiudi</button>}>
        {preview&&(()=>{ const d=agg[preview.nome]; const items=Object.values(d.items).sort((a,b)=>a.product.nome.localeCompare(b.product.nome)); return (
          <div>
            <div className="bg-slate-50 rounded-lg p-3 mb-3 text-sm">
              <div><strong>A:</strong> {preview.email}</div>
              {preview.cc&&<div><strong>CC:</strong> {preview.cc}</div>}
              <div><strong>Oggetto:</strong> Ordine farmacia {ml} - Finisterre Insubria</div>
            </div>
            <div className="overflow-x-auto">
              <table className="w-full text-sm">
                <thead className="text-xs uppercase text-slate-500 bg-slate-50"><tr>
                  <th className="py-2 px-2 text-left">Codice</th><th className="py-2 px-2 text-left">Prodotto</th>
                  <th className="py-2 px-2 text-right">Q.tà</th><th className="py-2 px-2 text-right">€/conf</th><th className="py-2 px-2 text-right">Totale</th>
                </tr></thead>
                <tbody>{items.map(({product,quantity})=>(
                  <tr key={product.id} className="border-t border-slate-100">
                    <td className="py-2 px-2 font-mono text-xs text-slate-500">{product.codice||"—"}</td>
                    <td className="py-2 px-2">{product.nome}</td>
                    <td className="py-2 px-2 text-right font-semibold">{quantity}</td>
                    <td className="py-2 px-2 text-right">{fmt(product.prezzo)}</td>
                    <td className="py-2 px-2 text-right font-semibold">{fmt(product.prezzo*quantity)}</td>
                  </tr>))}</tbody>
                <tfoot><tr className="border-t-2 border-slate-300"><td colSpan="4" className="py-2 px-2 text-right font-bold">TOTALE</td><td className="py-2 px-2 text-right font-bold text-blue-700">{fmt(d.total)}</td></tr></tfoot>
              </table>
            </div>
          </div>
        );})()}
      </Modal>
    </div>
  );
}

// ── ADMIN: MAGAZZINO ──────────────────────────────────────────
function TabWarehouse({warehouse,setWarehouse}){
  const PRODUCTS=useProducts();
  const [search,setSearch]=useState("");
  const filtered=useMemo(()=>{ if(!search.trim())return PRODUCTS.slice(0,60); const s=search.toLowerCase(); return PRODUCTS.filter(p=>p.nome.toLowerCase().includes(s)||(p.codice&&p.codice.toLowerCase().includes(s))); },[search,PRODUCTS]);
  function adj(id,d){ setWarehouse(p=>{const c=p[id]||0;return{...p,[id]:Math.max(0,c+d)};}); }
  function set_(id,v){ setWarehouse(p=>({...p,[id]:Math.max(0,parseInt(v)||0)})); }
  function sem(n){ if(n<5)return'bg-red-500'; if(n<20)return'bg-amber-500'; return'bg-green-500'; }
  return (
    <div>
      <div className="bg-amber-50 border border-amber-200 rounded-xl p-4 text-sm text-amber-900 mb-4 flex items-start gap-2">
        <Icon name="info" size={18} className="flex-shrink-0 mt-0.5"/>
        <div className="text-xs"><strong>Magazzino sede.</strong> Scorte fisiche presenti in sede (materiale di riserva Finisterre, non quello degli operatori). Aggiorna manualmente le giacenze. <strong>Prossima versione:</strong> auto-scarico quando si genera un ordine fornitore, auto-carico con il tasto "Materiale ricevuto".</div>
      </div>
      <div className="bg-white rounded-xl border border-slate-200 p-3 mb-3">
        <div className="relative"><Icon name="search" size={18} className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"/>
          <input type="text" value={search} onChange={e=>setSearch(e.target.value)} placeholder="Cerca prodotto…" className="w-full pl-10 pr-4 py-2.5 border border-slate-200 rounded-lg text-sm"/></div>
      </div>
      <div className="bg-white rounded-xl border border-slate-200 overflow-hidden">
        <div className="overflow-x-auto">
          <table className="w-full text-sm">
            <thead className="bg-slate-50 border-b border-slate-200">
              <tr>{["","Codice","Prodotto","Fornitore","Giacenza",""].map((h,i)=><th key={i} className={`px-4 py-3 font-semibold text-slate-700 ${i===4||i===5?"text-right":"text-left"}`}>{h}</th>)}</tr>
            </thead>
            <tbody>{filtered.map(p=>{ const stock=warehouse[p.id]||0; return (
              <tr key={p.id} className="border-b border-slate-100 hover:bg-slate-50/50">
                <td className="px-4 py-2"><span className={`inline-block w-3 h-3 rounded-full ${sem(stock)}`} title={stock<5?"Critico":stock<20?"Bassa":"OK"}></span></td>
                <td className="px-4 py-2 font-mono text-xs text-slate-500">{p.codice||"—"}</td>
                <td className="px-4 py-2">{p.nome}</td>
                <td className="px-4 py-2 text-slate-500 text-xs">{p.fornitore}</td>
                <td className="px-4 py-2 text-right">
                  <input type="number" value={stock} onChange={e=>set_(p.id,e.target.value)} className="w-20 text-center border border-slate-200 rounded py-1"/>
                </td>
                <td className="px-4 py-2 text-right">
                  <div className="inline-flex items-center gap-1">
                    <button onClick={()=>adj(p.id,-1)} className="w-7 h-7 rounded bg-slate-100 hover:bg-slate-200 flex items-center justify-center"><Icon name="minus" size={14}/></button>
                    <button onClick={()=>adj(p.id,+1)} className="w-7 h-7 rounded bg-blue-100 hover:bg-blue-200 text-blue-700 flex items-center justify-center"><Icon name="plus" size={14}/></button>
                  </div>
                </td>
              </tr>);
            })}</tbody>
          </table>
        </div>
      </div>
      {!search&&<div className="mt-3 text-xs text-slate-400 text-center">Mostra i primi 60 — usa la ricerca per trovarne altri</div>}
    </div>
  );
}

// ── ADMIN: GESTIONE OPERATORI ─────────────────────────────────
function TabGestioneOperatori({operators,setOperators}){
  const toast=useToast();
  const [search,setSearch]=useState("");
  const [editOp,setEditOp]=useState(null);   // {id, nome, cognome, cdc, email} | null
  const [addOpen,setAddOpen]=useState(false);
  const [delOp,setDelOp]=useState(null);
  const [delConfirm,setDelConfirm]=useState("");
  const [form,setForm]=useState({nome:"",cognome:"",cdc:"Insubria",email:"",sede_ritiro:""});

  const cdcs=["Insubria","Milano 1","Busto Arsizio","Monza","Monza 1","Milano Città","Milano 2","Bergamo","Lecco","Brescia","Valpadana","Sesto San Giovanni"];
  const filtered=useMemo(()=>{
    if(!search.trim())return operators;
    const s=search.toLowerCase();
    return operators.filter(o=>`${o.nome} ${o.cognome}`.toLowerCase().includes(s)||o.cdc.toLowerCase().includes(s)||(o.email||"").toLowerCase().includes(s)||(o.sede_ritiro||"").toLowerCase().includes(s));
  },[operators,search]);

  function addOperator(){
    if(!form.nome.trim()||!form.cognome.trim()){toast("Nome e cognome obbligatori","warning");return;}
    const exists=findOp(operators,form.nome,form.cognome);
    if(exists){toast("Operatore già presente","error");return;}
    const newOp={id:genId(operators),nome:norm(form.nome),cognome:norm(form.cognome),cdc:form.cdc,email:form.email,sede_ritiro:form.sede_ritiro||"",password:""};
    setOperators(p=>[...p,newOp]);
    toast(`${newOp.nome} ${newOp.cognome} aggiunto. Creerà la password al primo accesso.`,"success");
    setAddOpen(false); setForm({nome:"",cognome:"",cdc:"Insubria",email:"",sede_ritiro:""});
  }
  function saveEdit(){
    setOperators(p=>p.map(o=>o.id===editOp.id?{...o,cdc:editOp.cdc,email:editOp.email,sede_ritiro:editOp.sede_ritiro||""}:o));
    toast("Operatore aggiornato","success"); setEditOp(null);
  }
  function resetPassword(){
    setOperators(p=>p.map(o=>o.id===editOp.id?{...o,password:""}:o));
    toast(`Password di ${editOp.nome} ${editOp.cognome} azzerata. Dovrà crearne una nuova al prossimo accesso.`,"success");
    setEditOp(null);
  }
  function confirmDelete(){
    if(delConfirm!=="ELIMINA")return;
    setOperators(p=>p.filter(o=>o.id!==delOp.id));
    toast(`${delOp.nome} ${delOp.cognome} eliminato`,"success");
    setDelOp(null); setDelConfirm("");
  }

  const perCdc=useMemo(()=>{
    const m={}; operators.forEach(o=>{if(!m[o.cdc])m[o.cdc]=0; m[o.cdc]++;});
    return m;
  },[operators]);

  return (
    <div>
      <div className="flex items-center justify-between mb-4 flex-wrap gap-3">
        <div className="text-sm text-slate-600">{operators.length} operatori registrati</div>
        <button onClick={()=>setAddOpen(true)} className="px-4 py-2 bg-blue-700 hover:bg-blue-800 text-white font-semibold rounded-lg flex items-center gap-2 text-sm">
          <Icon name="user-plus" size={16}/> Aggiungi operatore
        </button>
      </div>

      {/* Stats per CDC */}
      <div className="flex flex-wrap gap-2 mb-4">
        {Object.entries(perCdc).map(([cdc,n])=>(
          <span key={cdc} className="px-3 py-1 bg-white border border-slate-200 rounded-full text-xs font-medium text-slate-700">{cdc}: <strong>{n}</strong></span>
        ))}
      </div>

      <div className="bg-white rounded-xl border border-slate-200 p-3 mb-3">
        <div className="relative"><Icon name="search" size={18} className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"/>
          <input type="text" value={search} onChange={e=>setSearch(e.target.value)} placeholder="Cerca per nome, cognome, CDC, sede ritiro o email…" className="w-full pl-10 pr-4 py-2.5 border border-slate-200 rounded-lg text-sm"/></div>
      </div>

      <div className="bg-white rounded-xl border border-slate-200 overflow-hidden">
        <div className="overflow-x-auto">
          <table className="w-full text-sm">
            <thead className="bg-slate-50 border-b border-slate-200">
              <tr>{["Operatore","CDC","Sede ritiro","Email","Password","Azioni"].map(h=>(
                <th key={h} className={`px-4 py-3 font-semibold text-slate-700 ${h==="Azioni"?"text-right":"text-left"}`}>{h}</th>))}
              </tr>
            </thead>
            <tbody>
              {filtered.map(op=>(
                <tr key={op.id} className="border-b border-slate-100 hover:bg-slate-50/50">
                  <td className="px-4 py-3 font-medium text-slate-900">{op.nome} {op.cognome}</td>
                  <td className="px-4 py-3 text-slate-600">{op.cdc}</td>
                  <td className="px-4 py-3 text-slate-500 text-xs">{op.sede_ritiro||<span className="italic text-slate-300">—</span>}</td>
                  <td className="px-4 py-3 text-slate-500 text-xs">{op.email||<span className="italic text-slate-300">non inserita</span>}</td>
                  <td className="px-4 py-3">
                    {op.password
                      ? <span className="inline-flex items-center gap-1 text-xs font-semibold bg-green-100 text-green-800 px-2 py-0.5 rounded-full"><span className="w-1.5 h-1.5 rounded-full bg-green-500"></span>Impostata</span>
                      : <span className="inline-flex items-center gap-1 text-xs font-semibold bg-slate-100 text-slate-600 px-2 py-0.5 rounded-full">Primo accesso</span>}
                  </td>
                  <td className="px-4 py-3 text-right">
                    <div className="flex items-center justify-end gap-1">
                      <button onClick={()=>setEditOp({...op})} className="p-1.5 text-slate-500 hover:text-blue-700 hover:bg-blue-50 rounded" title="Modifica"><Icon name="edit-3" size={16}/></button>
                      <button onClick={()=>{setDelOp(op);setDelConfirm("");}} className="p-1.5 text-slate-500 hover:text-red-700 hover:bg-red-50 rounded" title="Elimina"><Icon name="trash-2" size={16}/></button>
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>

      {/* Modal aggiunta */}
      <Modal open={addOpen} onClose={()=>setAddOpen(false)} title="Aggiungi operatore" size="sm"
        footer={<><button onClick={()=>setAddOpen(false)} className="px-4 py-2 bg-slate-100 hover:bg-slate-200 rounded-lg">Annulla</button>
          <button onClick={addOperator} className="px-4 py-2 bg-blue-700 hover:bg-blue-800 text-white font-semibold rounded-lg">Aggiungi</button></>}>
        <div className="space-y-3 text-sm">
          <div><label className="block font-medium text-slate-700 mb-1">Nome *</label>
            <input type="text" value={form.nome} onChange={e=>setForm(f=>({...f,nome:e.target.value.toUpperCase()}))} className="w-full px-3 py-2 border border-slate-300 rounded-lg uppercase" placeholder="es. MARIO"/></div>
          <div><label className="block font-medium text-slate-700 mb-1">Cognome *</label>
            <input type="text" value={form.cognome} onChange={e=>setForm(f=>({...f,cognome:e.target.value.toUpperCase()}))} className="w-full px-3 py-2 border border-slate-300 rounded-lg uppercase" placeholder="es. ROSSI"/></div>
          <div><label className="block font-medium text-slate-700 mb-1">CDC</label>
            <select value={form.cdc} onChange={e=>setForm(f=>({...f,cdc:e.target.value}))} className="w-full px-3 py-2 border border-slate-300 rounded-lg">

              {SITES.map(s=><option key={s.id} value={s.nome}>{s.nome}</option>)}</select></div>
          <div><label className="block font-medium text-slate-700 mb-1">Email (opzionale)</label>
            <input type="email" value={form.email} onChange={e=>setForm(f=>({...f,email:e.target.value}))} className="w-full px-3 py-2 border border-slate-300 rounded-lg" placeholder="nome@esempio.com"/></div>
          <div className="bg-blue-50 rounded-lg p-3 text-xs text-blue-900"><Icon name="info" size={14} className="inline mr-1"/>L'operatore creerà la propria password al primo accesso.</div>
        </div>

// ── ADMIN: IMPORTA ORDINI ALTRE SEDI ─────────────────────────
function TabImportaOrdini({externalOrders,setExternalOrders,mk}){
  const PRODUCTS=useProducts();
  const toast=useToast();
  const [sedeName,setSedeName]=useState("");
  const [importing,setImporting]=useState(false);
  const [preview,setPreview]=useState(null); // parsed items before confirm
  const fileRef=useRef(null);

  const monthExtOrders=externalOrders.filter(o=>o.month===mk);

  // Parsa CSV dal formato piattaforma: Codice;Prodotto;Pz/conf;Quantità;€/conf;Totale
  // o formato semplificato: Codice;Prodotto;Quantità
  function parseCSV(text){
    const lines=text.split(/\r?\n/).filter(l=>l.trim()&&!l.startsWith('"Codice')&&!l.startsWith('Codice'));
    const items=[];
    const unmatched=[];
    lines.forEach(line=>{
      const cols=line.split(/[;,]/).map(c=>c.replace(/^"|"$/g,'').trim());
      if(cols.length<2)return;
      const codice=(cols[0]||"").trim().toUpperCase();
      const nomeProd=(cols[1]||"").trim().toUpperCase();
      // quantità: cerca colonna qty (3° o 4° campo)
      let qty=0;
      for(let i=2;i<Math.min(cols.length,5);i++){const v=parseInt(cols[i]); if(!isNaN(v)&&v>0){qty=v;break;}}
      if(qty<=0)return;
      // Abbina per codice (priorità) poi per nome
      let prod=null;
      if(codice)prod=PRODUCTS.find(p=>p.codice&&p.codice.toUpperCase()===codice);
      if(!prod&&nomeProd)prod=PRODUCTS.find(p=>p.nome.toUpperCase()===nomeProd||p.nome.toUpperCase().startsWith(nomeProd.substring(0,20)));
      if(prod){ items.push({product_id:prod.id,quantity:qty,product_nome:prod.nome}); }
      else{ unmatched.push({codice,nome:nomeProd,qty}); }
    });
    return {items,unmatched};
  }

  function handleFile(e){
    const file=e.target.files[0]; if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      const text=ev.target.result;
      const {items,unmatched}=parseCSV(text);
      if(items.length===0&&unmatched.length===0){toast("File vuoto o formato non riconosciuto","error");return;}
      setPreview({items,unmatched,filename:file.name});
    };
    reader.readAsText(file,'UTF-8');
    e.target.value='';
  }

  function confirmImport(){
    if(!sedeName.trim()){toast("Inserisci il nome della sede","warning");return;}
    const existing=externalOrders.filter(o=>!(o.sede===sedeName&&o.month===mk));
    const newOrder={sede:sedeName,month:mk,items:preview.items,imported_at:new Date().toISOString(),filename:preview.filename};
    setExternalOrders([...existing,newOrder]);
    toast(`Ordine da ${sedeName} importato (${preview.items.length} prodotti)`, "success");
    setPreview(null); setSedeName(""); setImporting(false);
  }

  function removeExtOrder(sede){
    setExternalOrders(externalOrders.filter(o=>!(o.sede===sede&&o.month===mk)));
    toast(`Ordine di ${sede} rimosso`,"success");
  }

  const extTotal=(order)=>order.items.reduce((s,it)=>{const p=PRODUCTS.find(pp=>pp.id===it.product_id); return s+(p?p.prezzo*it.quantity:0);},0);

  return (
    <div>
      <div className="bg-blue-50 border border-blue-200 rounded-xl p-4 text-sm text-blue-900 mb-4 flex items-start gap-2">
        <Icon name="info" size={18} className="flex-shrink-0 mt-0.5"/>
        <div>
          <div className="font-semibold mb-1">Come funziona</div>
          <div className="text-xs space-y-1">
            <div>1. Le altre sedi ti inviano il loro file CSV ordini (generato dalla piattaforma o nel formato <span className="font-mono bg-blue-100 px-1 rounded">Codice;Prodotto;Quantità</span>)</div>
            <div>2. Carichi qui il file indicando da quale sede proviene</div>
            <div>3. La piattaforma abbina automaticamente i prodotti per codice articolo</div>
            <div>4. Il tab "Output & Email" includerà la somma di tutte le sedi nell'ordine finale al fornitore</div>
          </div>
        </div>
      </div>

      {/* Ordini esterni già importati */}
      {monthExtOrders.length>0&&(
        <div className="mb-4 space-y-2">
          <div className="text-sm font-semibold text-slate-700">Ordini importati per {monthLabel(mk)}</div>
          {monthExtOrders.map(o=>(
            <div key={o.sede} className="bg-white rounded-xl border border-green-200 p-4 flex items-center justify-between gap-3">
              <div className="flex items-center gap-3">
                <div className="bg-green-100 rounded-lg p-2"><Icon name="check-circle-2" size={20} className="text-green-700"/></div>
                <div>
                  <div className="font-semibold text-slate-900">{o.sede}</div>
                  <div className="text-xs text-slate-500">{o.items.length} articoli · {fmt(extTotal(o))} · importato {fmtDT(o.imported_at)}</div>
                  {o.filename&&<div className="text-xs text-slate-400">File: {o.filename}</div>}
                </div>
              </div>
              <button onClick={()=>removeExtOrder(o.sede)} className="p-2 text-slate-400 hover:text-red-600 hover:bg-red-50 rounded-lg"><Icon name="trash-2" size={16}/></button>
            </div>
          ))}
        </div>
      )}

      {!importing?(
        <button onClick={()=>setImporting(true)} className="w-full py-3 border-2 border-dashed border-blue-300 hover:border-blue-500 hover:bg-blue-50 rounded-xl text-blue-700 font-semibold flex items-center justify-center gap-2 transition">
          <Icon name="upload" size={20}/> Importa ordine da altra sede
        </button>
      ):(
        <div className="bg-white rounded-xl border border-slate-200 p-5 space-y-4">
          <div className="flex items-center justify-between">
            <div className="font-semibold text-slate-900">Importa ordine esterno</div>
            <button onClick={()=>{setImporting(false);setPreview(null);}} className="text-slate-400 hover:text-slate-700"><Icon name="x" size={20}/></button>
          </div>
          <div><label className="block text-sm font-medium text-slate-700 mb-1">Nome sede *</label>
            <input type="text" value={sedeName} onChange={e=>setSedeName(e.target.value)} placeholder="es. Bergamo, Milano 2, Brescia…"
              className="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm"/></div>
          <div>
            <label className="block text-sm font-medium text-slate-700 mb-1">File CSV della sede</label>
            <input type="file" ref={fileRef} accept=".csv,.txt,.xls,.xlsx" onChange={handleFile} className="hidden"/>
            <button onClick={()=>fileRef.current.click()} className="w-full py-3 border-2 border-dashed border-slate-300 hover:border-blue-400 hover:bg-blue-50 rounded-lg text-slate-600 flex items-center justify-center gap-2 transition text-sm">
              <Icon name="file-up" size={18}/> Seleziona file CSV…
            </button>
            <div className="text-xs text-slate-400 mt-1">Formati supportati: CSV separato da ; o , con colonne Codice, Prodotto, Quantità</div>
          </div>

          {/* Preview parsing */}
          {preview&&(
            <div className="space-y-3">
              <div className="flex items-center gap-2 text-sm">
                <Icon name="check-circle-2" size={18} className="text-green-600"/>
                <span><strong>{preview.items.length}</strong> prodotti abbinati</span>
                {preview.unmatched.length>0&&<span className="text-amber-600">· <strong>{preview.unmatched.length}</strong> non trovati nel catalogo</span>}
              </div>
              {preview.unmatched.length>0&&(
                <div className="bg-amber-50 border border-amber-200 rounded-lg p-3">
                  <div className="text-xs font-semibold text-amber-900 mb-1">Prodotti non abbinati (codice non trovato nel catalogo locale):</div>
                  <div className="space-y-0.5 max-h-24 overflow-y-auto">
                    {preview.unmatched.map((u,i)=><div key={i} className="text-xs text-amber-800">{u.codice||'—'} · {u.nome} · q.tà {u.qty}</div>)}
                  </div>
                  <div className="text-xs text-amber-700 mt-2">Questi prodotti NON saranno inclusi nell'ordine aggregato. Verifica che il catalogo sia aggiornato o correggi i codici nel file.</div>
                </div>
              )}
              <div className="max-h-48 overflow-y-auto scrollbar-thin space-y-1">
                {preview.items.slice(0,10).map((it,i)=>{
                  const p=PRODUCTS.find(pp=>pp.id===it.product_id);
                  return <div key={i} className="text-xs text-slate-600 bg-slate-50 px-2 py-1 rounded">{p?p.nome:'?'} × {it.quantity}</div>;
                })}
                {preview.items.length>10&&<div className="text-xs text-slate-400 text-center">… e altri {preview.items.length-10}</div>}
              </div>
              <button onClick={confirmImport} className="w-full py-3 bg-blue-700 hover:bg-blue-800 text-white font-semibold rounded-lg flex items-center justify-center gap-2">
                <Icon name="check" size={18}/> Conferma importazione da {sedeName||"…"}
              </button>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ── ADMIN: GESTIONE CATALOGO ──────────────────────────────────
function TabGestioneCatalogo({products,setProducts}){
  const toast=useToast();
  const [selSup,setSelSup]=useState(SUPPLIERS[0].nome);
  const [editProd,setEditProd]=useState(null);
  const [addOpen,setAddOpen]=useState(false);
  const [delProd,setDelProd]=useState(null);
  const [search,setSearch]=useState("");
  const cats=["Garze & Medicazioni","Cerotti & Bende","Aghi & Siringhe","Cateteri Vescicali","Guanti","Fleboclisi & Accessi Venosi","Farmaci","Consumabili Vari"];
  const emptyForm={codice:"",nome:"",pezzi_confezione:1,prezzo:0,categoria:"Consumabili Vari",prescrizione:false,note:"",fornitore:selSup};

  const supProds=useMemo(()=>{
    let p=products.filter(p=>p.fornitore===selSup);
    if(search.trim()){const s=search.toLowerCase();p=p.filter(pp=>pp.nome.toLowerCase().includes(s)||pp.codice.toLowerCase().includes(s));}
    return p.sort((a,b)=>a.nome.localeCompare(b.nome));
  },[products,selSup,search]);

  function saveEdit(){
    if(!editProd.nome.trim()){toast("Nome prodotto obbligatorio","warning");return;}
    setProducts(p=>p.map(pp=>pp.id===editProd.id?{...editProd,prezzo:parseFloat(editProd.prezzo)||0,pezzi_confezione:parseInt(editProd.pezzi_confezione)||1}:pp));
    toast("Prodotto aggiornato","success"); setEditProd(null);
  }
  function addProduct(form){
    if(!form.nome.trim()){toast("Nome prodotto obbligatorio","warning");return;}
    const newP={...form,id:genId(products),fornitore:selSup,prezzo:parseFloat(form.prezzo)||0,pezzi_confezione:parseInt(form.pezzi_confezione)||1};
    setProducts(p=>[...p,newP]); toast(`${newP.nome} aggiunto al catalogo ${selSup}`,"success"); setAddOpen(false);
  }
  function deleteProd(){
    setProducts(p=>p.filter(pp=>pp.id!==delProd.id)); toast(`${delProd.nome} eliminato dal catalogo`,"success"); setDelProd(null);
  }

  function ProdForm({init,onSave,onCancel}){
    const [f,setF]=useState(init);
    return (
      <div className="space-y-3 text-sm">
        <div className="grid grid-cols-2 gap-3">
          <div><label className="block font-medium text-slate-700 mb-1">Codice articolo</label>
            <input type="text" value={f.codice} onChange={e=>setF(p=>({...p,codice:e.target.value}))} className="w-full px-3 py-2 border border-slate-300 rounded-lg font-mono"/></div>
          <div><label className="block font-medium text-slate-700 mb-1">Pz/confezione</label>
            <input type="number" value={f.pezzi_confezione} onChange={e=>setF(p=>({...p,pezzi_confezione:e.target.value}))} min="1" className="w-full px-3 py-2 border border-slate-300 rounded-lg"/></div>
        </div>
        <div><label className="block font-medium text-slate-700 mb-1">Nome prodotto *</label>
          <input type="text" value={f.nome} onChange={e=>setF(p=>({...p,nome:e.target.value.toUpperCase()}))} className="w-full px-3 py-2 border border-slate-300 rounded-lg uppercase"/></div>
        <div className="grid grid-cols-2 gap-3">
          <div><label className="block font-medium text-slate-700 mb-1">Prezzo (€/conf)</label>
            <input type="number" value={f.prezzo} onChange={e=>setF(p=>({...p,prezzo:e.target.value}))} step="0.001" min="0" className="w-full px-3 py-2 border border-slate-300 rounded-lg"/></div>
          <div><label className="block font-medium text-slate-700 mb-1">Categoria</label>
            <select value={f.categoria} onChange={e=>setF(p=>({...p,categoria:e.target.value}))} className="w-full px-3 py-2 border border-slate-300 rounded-lg">
              {cats.map(c=><option key={c} value={c}>{c}</option>)}</select></div>
        </div>
        <div className="flex items-center gap-2">
          <input type="checkbox" id="presc" checked={!!f.prescrizione} onChange={e=>setF(p=>({...p,prescrizione:e.target.checked}))} className="w-4 h-4"/>
          <label htmlFor="presc" className="text-sm text-slate-700">Richiede prescrizione specialistica</label>

          <button onClick={()=>onSave(f)} className="px-4 py-2 bg-blue-700 hover:bg-blue-800 text-white font-semibold rounded-lg">Salva</button>
        </div>
      </div>
    );
  }

  return (
    <div>
      <div className="bg-amber-50 border border-amber-200 rounded-xl p-3 text-xs text-amber-900 mb-4 flex items-start gap-2">
        <Icon name="info" size={16} className="flex-shrink-0 mt-0.5"/>
        Le modifiche al catalogo hanno effetto immediato. Gli ordini già inviati mantengono i dati del momento dell'invio.
      </div>

      {/* Selettore fornitore */}
      <div className="flex flex-wrap gap-2 mb-4">
        {SUPPLIERS.map(s=>(
          <button key={s.nome} onClick={()=>{setSelSup(s.nome);setSearch("");}}
            className={`px-3 py-1.5 rounded-lg text-sm font-medium transition ${selSup===s.nome?'bg-blue-700 text-white':'bg-white border border-slate-200 text-slate-700 hover:bg-slate-50'}`}>
            {s.nome} <span className={`text-xs ml-1 ${selSup===s.nome?'text-blue-200':'text-slate-400'}`}>({products.filter(p=>p.fornitore===s.nome).length})</span>
          </button>
        ))}
      </div>

      <div className="flex items-center gap-3 mb-3 flex-wrap">
        <div className="relative flex-1 min-w-48">
          <Icon name="search" size={18} className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"/>
          <input type="text" value={search} onChange={e=>setSearch(e.target.value)} placeholder="Cerca prodotto…" className="w-full pl-10 pr-4 py-2.5 border border-slate-200 rounded-lg bg-white text-sm"/>
        </div>
        <button onClick={()=>setAddOpen(true)} className="px-4 py-2.5 bg-blue-700 hover:bg-blue-800 text-white text-sm font-semibold rounded-lg flex items-center gap-2">
